<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการจอง - ระบบจองห้องประชุม</title>
    <meta name="description" content="ประวัติการจองและยกเลิกการจองห้องประชุมทั้งหมด">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🏢 ระบบจองห้องประชุม</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">🏠 หน้าแรก</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">📅 การจอง</a></li>
                    <li class="nav-item"><a class="nav-link active" href="history.html">📜 ประวัติการจอง</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content-area mt-4">
        <h1 class="mb-4">📜 ประวัติการจองและยกเลิก</h1>
        <div id="historyContent"><!-- Filled by JS --></div>
        <div class="mt-4">
            <a href="booking.html" class="btn btn-primary">📅 ไปหน้าการจอง</a>
            <a href="index.html" class="btn btn-secondary ms-2">🏠 กลับหน้าแรก</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        function renderHistory() {
            const history = loadHistory();
            const container = document.getElementById('historyContent');
            if (history.length === 0) {
                container.innerHTML = `<div class="alert alert-info">ยังไม่มีประวัติการจองในระบบ</div>`;
                return;
            }
            container.innerHTML = `
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>เวลาทำรายการ</th>
                                <th>การดำเนินการ</th>
                                <th>ห้อง</th>
                                <th>ผู้จอง</th>
                                <th>วันที่</th>
                                <th>เวลา</th>
                                <th>หมายเหตุ</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${history.map(r => `
                                <tr>
                                    <td><small>${esc(r.action_time)}</small></td>
                                    <td>${r.action === 'created'
                                        ? `<span class="badge bg-success">✓ จองสำเร็จ</span>`
                                        : `<span class="badge bg-danger">✗ ยกเลิก</span>`}
                                    </td>
                                    <td><strong>${esc(r.room_name)}</strong></td>
                                    <td>${esc(r.booker_name)}</td>
                                    <td>${esc(r.date)}</td>
                                    <td>${esc(r.start_time)} - ${esc(r.end_time)}</td>
                                    <td><small class="text-muted">${esc(r.notes || '-')}</small></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        renderHistory();
        window.addEventListener('storage', renderHistory);
    </script>
</body>
</html>
