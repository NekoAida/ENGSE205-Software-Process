<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าแรก - ระบบจองห้องประชุม</title>
    <meta name="description" content="ระบบจองห้องประชุมออนไลน์ แสดงสถานะห้องประชุมทั้งหมด">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🏢 ระบบจองห้องประชุม</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">🏠 หน้าแรก</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">📅 การจอง</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html">📜 ประวัติการจอง</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container content-area">
        <h1 class="mb-4">🏠 สถานะห้องประชุม</h1>
        <div class="alert alert-info">
            <strong>ℹ️ คำแนะนำ:</strong> หากต้องการจองห้อง กรุณาไปที่เมนู
            <a href="booking.html" class="alert-link">📅 การจอง</a>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ชื่อห้อง</th>
                        <th>ความจุ</th>
                        <th>สถานะ</th>
                        <th>รายการจอง</th>
                    </tr>
                </thead>
                <tbody id="roomTableBody">
                    <!-- Filled by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        function renderRooms() {
            const tbody = document.getElementById('roomTableBody');
            tbody.innerHTML = '';
            ROOMS.forEach(room => {
                const bookings = getBookingsByRoom(room.id);
                const count = bookings.length;
                const statusHtml = count === 0
                    ? `<span class="status-available">ไม่มีการจอง ✓</span>`
                    : `<span class="status-busy">มี ${count} การจอง</span>`;

                let bookingsList = '<span class="text-muted">-</span>';
                if (bookings.length > 0) {
                    bookingsList = `<div class="booking-summary">${bookings.map(b =>
                        `<div class="mb-1"><small><strong>${esc(b.booker_name)}</strong> — ${esc(b.date)} (${esc(b.start_time)} - ${esc(b.end_time)})</small></div>`
                    ).join('')}</div>`;
                }

                tbody.insertAdjacentHTML('beforeend', `
                    <tr>
                        <td><strong>${esc(room.name)}</strong></td>
                        <td>${room.capacity} คน</td>
                        <td>${statusHtml}</td>
                        <td>${bookingsList}</td>
                    </tr>
                `);
            });
        }

        renderRooms();
        // Refresh when storage changes from another tab
        window.addEventListener('storage', renderRooms);
    </script>
</body>
</html>
