<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>การจองห้องประชุม - ระบบจองห้องประชุม</title>
    <meta name="description" content="จองหรือยกเลิกการจองห้องประชุม">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">🏢 ระบบจองห้องประชุม</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">🏠 หน้าแรก</a></li>
                    <li class="nav-item"><a class="nav-link active" href="booking.html">📅 การจอง</a></li>
                    <li class="nav-item"><a class="nav-link" href="history.html">📜 ประวัติการจอง</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container content-area">
        <h1 class="mb-4">📅 การจองห้องประชุม</h1>
        <div id="roomCards" class="row"><!-- Filled by JS --></div>
    </div>

    <!-- Booking Modals (generated per room) -->
    <div id="modalsContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // ===== Render Room Cards =====
        function renderCards() {
            const container = document.getElementById('roomCards');
            container.innerHTML = '';
            ROOMS.forEach(room => {
                const bookings = getBookingsByRoom(room.id);
                const bookingItems = bookings.length > 0
                    ? `<div class="booking-list">${bookings.map(b => `
                        <div class="booking-item">
                            <div class="booking-details">
                                <strong>👤 ${esc(b.booker_name)}</strong><br>
                                <span class="text-muted">📅 ${esc(b.date)} | ⏰ ${esc(b.start_time)} - ${esc(b.end_time)}</span>
                            </div>
                            <button class="btn btn-danger btn-sm" id="cancel-btn-${b.id}" onclick="handleCancel(${b.id})">❌ ยกเลิก</button>
                        </div>`).join('')}</div>`
                    : `<p class="text-muted">ยังไม่มีการจอง</p>`;

                container.insertAdjacentHTML('beforeend', `
                    <div class="col-md-6 col-lg-4 mb-4">
                        <div class="card h-100">
                            <div class="card-header bg-primary text-white">
                                <h5 class="mb-0">${esc(room.name)}</h5>
                                <small>ความจุ: ${room.capacity} คน</small>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <h6>📋 รายการจอง:</h6>
                                <div class="flex-grow-1">${bookingItems}</div>
                                <div class="d-grid gap-2 mt-3">
                                    <button class="btn btn-primary"
                                        data-bs-toggle="modal"
                                        data-bs-target="#bookingModal${room.id}">
                                        📝 จองห้องนี้
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        // ===== Render Booking Modals =====
        function renderModals() {
            const container = document.getElementById('modalsContainer');
            container.innerHTML = '';
            ROOMS.forEach(room => {
                const today = todayStr();
                container.insertAdjacentHTML('beforeend', `
                    <div class="modal fade" id="bookingModal${room.id}" tabindex="-1" aria-hidden="true">
                        <div class="modal-dialog modal-dialog-centered">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title">🏢 จองห้องประชุม: ${esc(room.name)}</h5>
                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <div class="booking-info">
                                        <h6>📍 ห้องที่เลือก</h6>
                                        <p>${esc(room.name)}</p>
                                    </div>
                                    <div class="booking-info">
                                        <h6>👥 ความจุ</h6>
                                        <p>${room.capacity} คน</p>
                                    </div>
                                    <form id="bookingForm${room.id}" onsubmit="handleBook(event, ${room.id})">
                                        <div class="mb-3">
                                            <label class="form-label"><strong>👤 ชื่อผู้จอง</strong></label>
                                            <input type="text" class="form-control" name="booker_name"
                                                id="bookerName${room.id}" placeholder="กรอกชื่อผู้จอง" required autocomplete="off">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label"><strong>📧 อีเมลผู้จอง</strong></label>
                                            <input type="email" class="form-control" name="booker_email"
                                                id="bookerEmail${room.id}" placeholder="you@example.com" required autocomplete="email">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label"><strong>📅 วันที่จอง</strong></label>
                                            <input type="date" class="form-control" name="date"
                                                id="bookingDate${room.id}" min="${today}" required>
                                        </div>
                                        <div class="row">
                                            <div class="col-6">
                                                <label class="form-label"><strong>⏰ เวลาเริ่ม</strong></label>
                                                <input type="time" class="form-control" name="start_time"
                                                    id="startTime${room.id}" required>
                                            </div>
                                            <div class="col-6">
                                                <label class="form-label"><strong>⏰ เวลาสิ้นสุด</strong></label>
                                                <input type="time" class="form-control" name="end_time"
                                                    id="endTime${room.id}" required>
                                            </div>
                                        </div>
                                        <div class="form-text mt-2">กรุณาเลือกวันที่และเวลาที่ต้องการจอง</div>
                                    </form>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
                                    <button type="submit" form="bookingForm${room.id}" class="btn btn-primary">
                                        ✅ ยืนยันการจอง
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });
        }

        // ===== Handle Book Submit =====
        function handleBook(event, roomId) {
            event.preventDefault();
            const form = event.target;
            const bookerName  = form.booker_name.value.trim();
            const bookerEmail = form.booker_email.value.trim();
            const date        = form.date.value;
            const startTime   = form.start_time.value;
            const endTime     = form.end_time.value;

            if (!bookerName || !bookerEmail || !date || !startTime || !endTime) {
                showToast('❌ กรุณากรอกข้อมูลให้ครบถ้วน!', 'danger');
                return;
            }
            if (startTime >= endTime) {
                showToast('❌ เวลาเริ่มต้นต้องน้อยกว่าเวลาสิ้นสุด!', 'danger');
                return;
            }
            if (!isSlotAvailable(roomId, date, startTime, endTime)) {
                const roomName = getRoomName(roomId);
                showToast(`❌ ไม่สามารถจองได้! ${roomName} มีการจองในช่วงเวลาที่ทับซ้อน (${date} ${startTime}-${endTime})`, 'danger');
                return;
            }

            createBooking(roomId, bookerName, bookerEmail, date, startTime, endTime);
            const roomName = getRoomName(roomId);

            // Close modal
            const modalEl = document.getElementById(`bookingModal${roomId}`);
            bootstrap.Modal.getInstance(modalEl)?.hide();

            form.reset();
            renderCards();
            showToast(`✅ จองห้อง ${roomName} สำเร็จ! วันที่ ${date} เวลา ${startTime}-${endTime}`, 'success');
        }

        // ===== Handle Cancel =====
        function handleCancel(bookingId) {
            const cancelled = cancelBooking(bookingId);
            if (cancelled) {
                const roomName = getRoomName(cancelled.room_id);
                renderCards();
                showToast(`✅ ยกเลิกการจองห้อง ${roomName} สำเร็จ!`, 'success');
            } else {
                showToast('❌ ไม่พบการจองที่ต้องการยกเลิก', 'danger');
            }
        }

        // ===== Init =====
        renderModals();
        renderCards();
        window.addEventListener('storage', () => { renderCards(); });
    </script>
</body>
</html>
